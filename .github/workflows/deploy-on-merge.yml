name: Deploy on merge to master

on:
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy RSVP app
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read deploy settings from Makefile
        id: deploy-config
        run: |
          echo "role_arn=$(make -s print-aws-deploy-role-arn)" >> "$GITHUB_OUTPUT"
          echo "aws_region=$(make -s print-aws-region)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.deploy-config.outputs.role_arn }}
          role-session-name: github-actions-ppmxbbg-rsvp-deploy
          aws-region: ${{ steps.deploy-config.outputs.aws_region }}

      - name: Deploy
        run: make --silent deploy
